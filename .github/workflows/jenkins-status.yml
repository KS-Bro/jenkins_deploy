name: jenkins-status

on:
  push:
    branches:
      - Dev
      - QA
      - main

  pull_request:
    branches:
      - Dev
      - QA
      - main

jobs:
  jenkins-status:
    runs-on: ubuntu-latest

    steps:
      - name: Determine branch
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH_NAME="$GITHUB_HEAD_REF"
          else
            BRANCH_NAME="$GITHUB_REF_NAME"
          fi

          echo "Branch Name: $BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Wait for Jenkins build
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |

          JOB_PATH="job/jenkins-deploy/job/${BRANCH_NAME}"

          echo "=================================="
          echo "Branch      : $BRANCH_NAME"
          echo "Job Path    : $JOB_PATH"
          echo "Jenkins URL : $JENKINS_URL"
          echo "=================================="

          echo "Waiting 20 seconds for Jenkins..."
          sleep 20

          LAST_BUILD=$(curl -s \
            -u "$JENKINS_USER:$JENKINS_TOKEN" \
            "$JENKINS_URL/$JOB_PATH/lastBuild/api/json")

          echo "========== Jenkins Response =========="
          echo "$LAST_BUILD"
          echo "======================================"

          BUILD_NUMBER=$(echo "$LAST_BUILD" | jq -r '.number')

          if [ -z "$BUILD_NUMBER" ] || [ "$BUILD_NUMBER" = "null" ]; then
            echo "Unable to find Jenkins build."
            exit 1
          fi

          echo "Tracking Build #$BUILD_NUMBER"

          while true
          do
              STATUS=$(curl -s \
                -u "$JENKINS_USER:$JENKINS_TOKEN" \
                "$JENKINS_URL/$JOB_PATH/$BUILD_NUMBER/api/json")

              BUILDING=$(echo "$STATUS" | jq -r '.building')

              if [ "$BUILDING" = "false" ]; then
                  break
              fi

              echo "Still building..."
              sleep 10
          done

          RESULT=$(echo "$STATUS" | jq -r '.result')

          echo "=================================="
          echo "Build Result : $RESULT"
          echo "=================================="

          if [ "$RESULT" != "SUCCESS" ]; then

            echo ""
            echo "======================================"
            echo "JENKINS BUILD FAILED"
            echo "======================================"

            curl -s \
              -u "$JENKINS_USER:$JENKINS_TOKEN" \
              "$JENKINS_URL/$JOB_PATH/$BUILD_NUMBER/consoleText" | tail -60

            exit 1
          fi

          echo "Jenkins Build Successful."