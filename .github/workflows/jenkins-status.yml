name: jenkins-status
on:
  push:
    branches:
      - Dev
      - QA
      - main
  pull_request:
    branches:
      - Dev
      - QA
      - main
jobs:
  jenkins-status:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Branch
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH_NAME="$GITHUB_BASE_REF"
          else
            BRANCH_NAME="$GITHUB_REF_NAME"
          fi
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "Branch: $BRANCH_NAME"

      - name: Trigger Jenkins Build
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |
          JOB_PATH="job/jenkins-deploy/job/${BRANCH_NAME}"

          echo "Triggering new build for $BRANCH_NAME..."

          QUEUE_URL=$(curl -s -i -u "$JENKINS_USER:$JENKINS_TOKEN" \
            -X POST "$JENKINS_URL/$JOB_PATH/build" | grep -i "^Location:" | awk '{print $2}' | tr -d '\r')

          echo "Queue URL: $QUEUE_URL"
          echo "QUEUE_URL=$QUEUE_URL" >> $GITHUB_ENV

      - name: Wait for Build Number from Queue
        env:
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |
          BUILD_NUMBER=""
          for i in $(seq 1 30); do
            QUEUE_INFO=$(curl -s -u "$JENKINS_USER:$JENKINS_TOKEN" "${QUEUE_URL}api/json")
            BUILD_NUMBER=$(echo "$QUEUE_INFO" | jq -r '.executable.number // empty')

            if [ -n "$BUILD_NUMBER" ]; then
              echo "Build started: #$BUILD_NUMBER"
              break
            fi

            echo "Waiting for build to start... ($i0s)"
            sleep 10
          done

          if [ -z "$BUILD_NUMBER" ]; then
            echo "Build did not start in time."
            exit 1
          fi

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Wait for Jenkins Build to Finish
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
        run: |
          JOB_PATH="job/jenkins-deploy/job/${BRANCH_NAME}"
          BUILD_URL="$JENKINS_URL/$JOB_PATH/$BUILD_NUMBER/"

          echo "### 🔧 Jenkins Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** $BRANCH_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Jenkins Build ID:** #$BUILD_NUMBER" >> $GITHUB_STEP_SUMMARY
          echo "- **Build URL:** $BUILD_URL" >> $GITHUB_STEP_SUMMARY

          while true
          do
            STATUS=$(curl -s -u "$JENKINS_USER:$JENKINS_TOKEN" \
              "$JENKINS_URL/$JOB_PATH/$BUILD_NUMBER/api/json")

            BUILDING=$(echo "$STATUS" | jq -r '.building')

            if [ "$BUILDING" = "false" ]; then
              break
            fi

            echo "Still Building Jenkins #$BUILD_NUMBER ..."
            sleep 10
          done

          RESULT=$(echo "$STATUS" | jq -r '.result')
          echo "Result = $RESULT"
          echo "- **Result:** $RESULT" >> $GITHUB_STEP_SUMMARY

          if [ "$RESULT" != "SUCCESS" ]; then
            echo "Jenkins Build #$BUILD_NUMBER Failed"
            curl -s -u "$JENKINS_USER:$JENKINS_TOKEN" \
              "$JENKINS_URL/$JOB_PATH/$BUILD_NUMBER/consoleText" | tail -100
            exit 1
          fi

          echo "Jenkins Build #$BUILD_NUMBER Successful."